<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CanteenDash - Register</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="logo">🍜</div>
      <h1>UNIVERSITY PORTAL</h1>
      <p>Create your CanteenDash account</p>

      <form id="registerForm" autocomplete="off">
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <div class="input-wrapper">
            <span class="input-icon">👤</span>
            <input type="text" id="fullName" placeholder="Enter your full name" required>
          </div>
        </div>

        <div class="form-group">
          <label for="studentId">Student ID</label>
          <div class="input-wrapper">
            <span class="input-icon">🎓</span>
            <input type="text" id="studentId" placeholder="Enter your Student ID" required>
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <div class="input-wrapper">
            <span class="input-icon">✉️</span>
            <input type="email" id="email" placeholder="Enter your email" autocomplete="off" required>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input type="password" id="password" placeholder="Create a password" required>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
          </div>
        </div>

        <button type="submit" class="btn btn-primary">Register</button>
      </form>

      <div class="register-link" style="margin-top: 20px;">
        <p>Already have an account? <a href="index.html">Login</a></p>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('registerForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password !== confirmPassword) {
        alert('Passwords do not match!');
        return;
      }

      // Redirect to login after "registration"
      alert('Registration successful! Please login.');
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
